<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #FFF9F7;
    color: #3B2F2F;
    text-align: center;
}

/* HERO */
.hero {
    padding: 80px 20px;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 50px;
    color: #B78B5D;
}

h2 {
    font-weight: normal;
}

/* MUSIC CARD */
.music {
    margin: 30px auto;
    max-width: 500px;
}

/* BUTTON */
button {
    background: #B78B5D;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Shu Atelier Wedding</h1>
    <h2>Nur & Adam</h2>
    <p>12 December 2026</p>

    <p style="margin-top:20px;">
        "Together with our families, we invite you to celebrate our wedding"
    </p>
</div>

<!-- MUSIC -->
<div class="music">
    <h3>🎵 Terima Kasih Cinta - Afgan</h3>

    <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/track/3NAs0Yhq5pDrHpkC6sg2Vi"
        width="100%" height="152"
        frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
    </iframe>
</div>

<button>View Invitation Details</button>

</body>
</html>
<iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/track/3NAs0Yhq5pDrHpkC6sg2Vi"
    width="100%" height="152"
    frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="lazy">
</iframe>
